<style>
*{margin:0;padding:0;box-sizing:border-box;list-style:none;}
body{font-family:"微软雅黑";background:#f5f5f5;padding:20px;}

.logo{color:white;font-size:22px;}
.nav{margin-left:auto;}
.nav ul{display:flex;gap:25px;}
.nav a{color:white;text-decoration:none;}
#main{max-width:950px;margin:30px auto;display:flex;gap:40px;align-items:flex-start;}
.detail-img img{width:320px;border-radius:8px;box-shadow:0 2px 10px #ccc;}
/* 右侧三栏布局 */
.detail-text{flex:1;line-height:2.0;font-size:16px;display:grid;grid-template-columns:1fr 2fr 1fr;gap:20px;}
.base-info{background:#fff;padding:15px;border-radius:8px;box-shadow:0 1px 5px #eee;}
.base-info h3{margin-bottom:10px;color:#333;border-bottom:1px solid #eee;padding-bottom:8px;}
.base-info p{margin:8px 0;color:#666;}
.intro-info{background:#fff;padding:15px;border-radius:8px;box-shadow:0 1px 5px #eee;}
.intro-info h3{margin-bottom:10px;color:#333;border-bottom:1px solid #eee;padding-bottom:8px;}
.intro-info p{color:#666;line-height:1.8;}
.actor-info{background:#fff;padding:15px;border-radius:8px;box-shadow:0 1px 5px #eee;}
.actor-info h3{margin-bottom:10px;color:#333;border-bottom:1px solid #eee;padding-bottom:8px;}
.actor-info ul li{margin:5px 0;color:#666;}
/* 收藏按钮 */
.collect-btn{margin:15px 0;padding:8px 15px;background:#fff;border:1px solid #ff4400;color:#ff4400;border-radius:4px;cursor:pointer;transition:all 0.3s;}
.collect-btn:hover{background:#ff4400;color:#fff;}
.collect-btn.active{background:#ff4400;color:#fff;}
/* 星级评分 */
.star-score{margin:10px 0;}
.star-score .stars{display:flex;gap:5px;cursor:pointer;}
.star-score .star{font-size:20px;color:#ddd;}
.star-score .star.active{color:#ffd700;}
.star-score .score-text{margin-top:5px;color:#666;}
#footer{max-width:950px;height:55px;background:#222;color:white;text-align:center;line-height:55px;margin:30px auto 0;border-radius:6px;}
.back-home{margin-top:20px;display:inline-block;color:red;font-size:16px;text-decoration:none;}
</style>
</head>

// 获取URL剧集ID
var id = location.search.split("=")[1];
if(!id){
    id = 1;
}
var currentData = data[id];

// 渲染基础信息
document.getElementById("poster").src = currentData.img;
document.getElementById("type").innerText = currentData.type;
document.getElementById("score").innerText = currentData.score;
document.getElementById("intro").innerText = currentData.intro;

// 渲染主演（ES5无箭头）
var actorList = document.getElementById("actors");
currentData.actors.forEach(function(actor){
  var li = document.createElement("li");
  li.innerText = actor;
  actorList.appendChild(li);
});

// 收藏按钮逻辑
var collectBtn = document.getElementById("collectBtn");
var collectedDramas = JSON.parse(localStorage.getItem("collectedDramas") || "[]");
if(collectedDramas.indexOf(id) > -1){
  collectBtn.classList.add("active");
  collectBtn.innerText = "已收藏";
}
collectBtn.addEventListener("click", function(){
  if(collectedDramas.indexOf(id) > -1){
    // 取消收藏 filter ES5写法
    collectedDramas = collectedDramas.filter(function(item){
      return item !== id;
    });
    collectBtn.classList.remove("active");
    collectBtn.innerText = "收藏该剧";
  }else{
    collectedDramas.push(id);
    collectBtn.classList.add("active");
    collectBtn.innerText = "已收藏";
  }
  localStorage.setItem("collectedDramas", JSON.stringify(collectedDramas));
});

// 星级评分逻辑
var stars = document.querySelectorAll("#starContainer .star");
var scoreText = document.getElementById("scoreText");
var scoreNum = currentData.scoreNum;
var starLevel = Math.round(scoreNum / 2);

// 初始化星级（ES5 forEach）
stars.forEach(function(star, index){
  if(index < starLevel){
    star.classList.add("active");
  }
});
scoreText.innerText = "当前评分：" + scoreNum + "分";

// 鼠标悬浮、点击星级（ES5 无箭头）
for(var i=0; i<stars.length; i++){
  // 悬浮预览
  stars[i].onmouseover = function(){
    var idx = Array.prototype.indexOf.call(stars, this);
    for(var j=0; j<stars.length; j++){
      if(j <= idx){
        stars[j].classList.add("active");
      }else{
        stars[j].classList.remove("active");
      }
    }
    scoreText.innerText = "你选择了" + ((idx + 1) * 2) + "分";
  };
  // 鼠标离开恢复
  stars[i].onmouseout = function(){
    for(var j=0; j<stars.length; j++){
      if(j < starLevel){
        stars[j].classList.add("active");
      }else{
        stars[j].classList.remove("active");
      }
    }
    scoreText.innerText = "当前评分：" + scoreNum + "分";
  };
  // 点击打分
  stars[i].onclick = function(){
    var idx = Array.prototype.indexOf.call(stars, this);
    starLevel = idx + 1;
    scoreNum = starLevel * 2;
    scoreText.innerText = "已评分：" + scoreNum + "分";
  };
}
</script>
