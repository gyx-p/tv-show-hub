<script>
var bannerBox = document.querySelector('.banner-box');
var wrap = document.querySelector('.banner-wrap');
var imgs = document.querySelectorAll('.banner-wrap a');
var dots = document.querySelectorAll('.dot');
var prev = document.querySelector('.prev-btn');
var next = document.querySelector('.next-btn');
var index = 0;
var imgWidth = bannerBox.offsetWidth;
var timer;

function changeSlide(){
  wrap.style.transform = 'translateX(-' + index * imgWidth + 'px)';
  for(var i=0;i<dots.length;i++){
    dots[i].classList.remove('active');
  }
  dots[index].classList.add('active');
}

function autoPlay(){
  timer = setInterval(function(){
    index++;
    if(index >= imgs.length){
      index = 0;
    }
    changeSlide();
  },4000);
}

next.onclick = function(){
  clearInterval(timer);
  index++;
  if(index >= imgs.length){
    index = 0;
  }
  changeSlide();
  autoPlay();
};
prev.onclick = function(){
  clearInterval(timer);
  index--;
  if(index < 0){
    index = imgs.length - 1;
  }
  changeSlide();
  autoPlay();
};
for(var i=0;i<dots.length;i++){
  dots[i].onclick = function(){
    clearInterval(timer);
    index = Array.prototype.indexOf.call(dots,this);
    changeSlide();
    autoPlay();
  };
}
bannerBox.onmouseenter = function(){
  clearInterval(timer);
};
bannerBox.onmouseleave = function(){
  autoPlay();
};
window.onload = autoPlay;
</script>
